<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

</head>

<body>

<div class="container">

    <h1>Registration Form</h1>

    <form>

        <label>Name:</label>
        <input type="text" id="txtName" placeholder="Enter your Name" required>

        <label>Email:</label>
        <input type="email" id="txtEmail" placeholder="Enter your Email" required>

        <label>Phone No:</label>
        <input type="tel" id="txtPhone" placeholder="Enter your Phone Number" required>

        <label>Gender:</label><br><br>

        <input type="radio" id="male" name="gender" checked>
        <label for="male">Male</label>

        <input type="radio" id="female" name="gender">
        <label for="female">Female</label>

        <input type="radio" id="transgender" name="gender">
        <label for="transgender">Transgender</label>

        <input type="radio" id="other" name="gender">
        <label for="other">Prefer Not To Say</label>

        <br><br>

        <label>DOB:</label>
        <input type="date" id="dtDOB">

        <label>Password:</label>
        <input type="password" id="pwdPassword" placeholder="Enter Password">

        <label>Confirm Password:</label>
        <input type="password" id="pwdConfirmPassword" placeholder="Confirm Password">

        <input type="submit" value="Submit">

    </form>

</div>

</body>
</html>
